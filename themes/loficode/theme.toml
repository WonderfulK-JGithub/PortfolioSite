name = "LofiCode"
license = "MIT"
licenselink = "https://github.com/meimakes/loficode-hugo-theme/blob/master/LICENSE"
description = "A cozy, lo-fi inspired Hugo theme. Features ambient sounds, dark/light themes, and a retro aesthetic with modern functionality."

# The home page of the theme, where the source can be found.
homepage = "https://github.com/meimakes/loficode-hugo-theme"

# If you have a running demo of the theme.
demosite = "https://meimakes.com/loficode-hugo-theme"

tags = ["blog", "personal", "portfolio", "developer", "creative", "dark", "light", "responsive", "retro", "lo-fi"]
features = ["ambient-sounds", "dark-mode", "light-mode", "responsive", "search", "toc", "syntax-highlighting", "coffee-theme", "retro-aesthetic", "spa-navigation"]

# Theme author
[author]
    name = "meimakes"
    homepage = "https://github.com/meimakes"



theme = "loficode"

[params]
  description = "Your site description"

  [params.author]
    name = "Your Name"
    image = "images/profile.png"

  # Profile section
  [params.profile]
    name = "Your Name"
    tagline = "Your tagline here"
    photo = "/images/profile.png"

  # Social links - Supported platforms: github, twitter, linkedin, email, mastodon, youtube, instagram, facebook
  [params.social]
    github = "meimakes"
    twitter = "meimakes"
    # linkedin = "your-linkedin-username"
    # email = "your-email@example.com"
    # mastodon = "https://mastodon.social/@yourusername"
    # youtube = "https://youtube.com/@yourusername"
    # instagram = "your-instagram-username"
    # facebook = "your-facebook-username"

# Navigation menu
[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 10

[[menu.main]]
  name = "Contact"
  url = "/contact/"
  weight = 20
