baseURL = "https://wonderfulk-jgithub.github.io"
languageCode = "en-us"
title = "Karl-Johan Warenius"
theme = "loficode"
#theme = [ 'loficode', 'hugo-shortcodes' ]
# Enable emoji support
enableEmoji = true

# Output formats for SPA functionality
[outputs]
  home = ["HTML", "JSON", "pages"]
  page = ["HTML"]
  section = ["HTML"]

# Custom output formats
[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName = "index"
    isPlainText = true
  [outputFormats.pages]
    mediaType = "application/json"
    baseName = "pages"
    isPlainText = true

# Pagination
[pagination]
  pagerSize = 6
  path = "page"

[params]
  description = "A cozy example site showcasing the LofiCode Hugo theme"
  tagline = "UI and Tools programmer"

  # Profile section
  [params.author]
    name = "Karl-Johan Dev"
    image = "images/ProfilePic.jpg"

  # Social links - Supported platforms: github, twitter, linkedin, email, mastodon, youtube, instagram, facebook
  [params.social]
    github = "https://github.com/WonderfulK-JGithub"
    #twitter = "https://twitter.com/example"
    linkedin = "https://www.linkedin.com/in/karl-johan-warenius-834a77303/"
    email = "wareniuskarljohan@gmail.com"
    # mastodon = "https://mastodon.social/@example"
    # youtube = "https://youtube.com/@example"
    # instagram = "https://instagram.com/example"
    # facebook = "https://facebook.com/example"

# Main navigation menu
[[menu.main]]
  name = "About & Contact"
  url = "/about/"
  weight = 10

#[[menu.main]]
 # name = "Contact"
 # url = "/contact/"
 # weight = 20

 [[menu.contact]]
  name = "About & Contact"
  url = "/about/"
  weight = 10

# Markup configuration for syntax highlighting
[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = true
    lineNumbersInTable = false
    tabWidth = 2
    noClasses = false

# Taxonomies
[taxonomies]
  tag = "tags"
  category = "categories"
  
[caches]
  [caches.images]
    dir = ':cacheDir/images'